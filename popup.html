<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeContext</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="card">
      <header class="header">
        <h1>TimeContext</h1>
        <p class="subtitle">Keep AI grounded in real-world time.</p>
      </header>

      <section class="toggle-row">
        <span class="toggle-label">Extension Enabled</span>
        <label class="switch" for="enabledToggle">
          <input type="checkbox" id="enabledToggle" />
          <span class="slider"></span>
        </label>
      </section>

      <section class="status-box">
        <p class="status-title">Currently injecting:</p>
        <p id="previewText" class="preview-text"></p>
      </section>

      <section class="sites-box">
        <p class="sites-title">Supported sites</p>
        <ul>
          <li>chatgpt.com / chat.openai.com</li>
          <li>claude.ai</li>
          <li>gemini.google.com</li>
          <li>www.perplexity.ai</li>
        </ul>
      </section>

      <footer class="footer">Made to fight AI temporal blindness</footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
