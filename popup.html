<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TimeContext</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="container">
      <header class="header">
        <div class="header-left">
          <span class="header-title">⏱️ TimeContext</span>
        </div>
        <span class="header-version">v1.0.1</span>
      </header>

      <section class="toggle-row">
        <div class="toggle-left">
          <span class="status-dot" id="statusDot"></span>
          <span class="toggle-label">Active</span>
        </div>
        <label class="switch" for="enabledToggle">
          <input type="checkbox" id="enabledToggle" />
          <span class="slider"></span>
        </label>
      </section>

      <section class="preview-card">
        <span class="preview-label">INJECTING</span>
        <p id="previewText" class="preview-text"></p>
      </section>

      <div class="site-status" id="siteStatus">
        <span class="site-status-text">— Not on a supported site</span>
      </div>

      <section class="sites-section">
        <span class="pill">ChatGPT</span>
        <span class="pill">Claude</span>
        <span class="pill">Gemini</span>
        <span class="pill">Perplexity</span>
      </section>

      <footer class="footer">v1.0.1 · Made by Hahnlin</footer>
    </main>

    <script src="popup.js"></script>
  </body>
</html>
